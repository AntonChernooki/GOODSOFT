spring.application.name=Autobase
server.port=8081



mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.Autobase.model.entities



debug=true
logging.level.root=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.springframework.beans=DEBUG
logging.level.org.springframework.context=DEBUG

logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.jdbc.core=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

logging.level.com.zaxxer.hikari=DEBUG


mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
logging.level.org.mybatis=DEBUG
logging.level.org.apache.ibatis=DEBUG


logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.authentication=DEBUG


logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE


management.endpoints.web.exposure.include=httptrace
management.trace.http.enabled=true
logging.level.org.springframework.boot.actuate.web.trace=DEBUG


spring.devtools.restart.log-condition-evaluation-delta=false
logging.level.org.springframework.boot.devtools=DEBUG


logging.level.org.springframework.web.servlet.handler=TRACE

logging.level.org.springframework.boot.context.properties=TRACE