<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/" class="brand-link">🚗 Autobase</a>
  </div>

  <ul class="navbar-menu">
    @if(authService.isLoggedIn()){
      @if(authService.isAdmin() || authService.isDispatcher()){
      <li><a routerLink="/dispatcher/dashboard">Диспетчер</a></li>
      }
      @if(authService.isAdmin()){
      <li><a routerLink="/users">Пользователи</a></li>
      }
      @if(authService.isDriver()){
      <li><a routerLink="/driver/dashboard">Водитель</a></li>
      <li><a routerLink="/driver/profile">Профиль</a></li>
      }
      <li>
        <button (click)="logout()" class="btn-logout" type="button">Выйти</button>
      </li>
    } @else {
      <li><a routerLink="/login">Войти</a></li>
      <li><a routerLink="/registration">Регистрация</a></li>
    }
  </ul>
</nav>
