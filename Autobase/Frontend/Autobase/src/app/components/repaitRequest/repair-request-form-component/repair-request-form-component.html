<div class="modal-overlay">
  <div class="modal-content">
    <h3>Создание заявки на ремонт</h3>

    <form [formGroup]="form">
      <div class="form-group">
        <label for="description">Опишите поломку:</label>
        <textarea
          id="description"
          formControlName="description"
          class="form-control"
          rows="4"
          placeholder="Подробно опишите неисправность..."
          [class.is-invalid]="form.get('description')?.invalid && form.get('description')?.touched"
        ></textarea>
        @if(form.get('description')?.invalid && form.get('description')?.touched){
        <span class="invalid-feedback">Описание обязательно</span>
        }
      </div>

      <div class="modal-actions">
        <button type="button" (click)="submit()" class="btn-modal btn-danger" [disabled]="isSubmitting()">
          @if(isSubmitting()){
          <span class="spinner"></span>
          }
          Отправить заявку
        </button>
        <button type="button" (click)="close.emit()" class="btn-modal btn-secondary">Отмена</button>
      </div>
    </form>
  </div>
</div>
