<div class="login-container">
  <div class="login-card">
    <div class="login-card__header">
      <h3>Вход в систему</h3>
    </div>

    <div class="login-card__body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="login">Логин</label>
          <input
            type="text"
            id="login"
            class="form-control"
            formControlName="login"
            [class.is-invalid]="loginForm.get('login')?.invalid && loginForm.get('login')?.touched"
          />
          @if(loginForm.get('login')?.invalid && loginForm.get('login')?.touched){
          <span class="invalid-feedback">Логин обязателен</span>
          }
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          @if(loginForm.get('password')?.invalid && loginForm.get('password')?.touched){
          <span class="invalid-feedback">Пароль обязателен</span>
          }
        </div>

        <button type="submit" class="btn btn--primary" [disabled]="isLoading()">
          @if(isLoading()){
          <span class="spinner"></span>
          }
          Войти
        </button>
      </form>
    </div>

    <div class="login-card__footer">
      <a routerLink="/registration" class="link">Нет аккаунта? Зарегистрироваться</a>
    </div>
  </div>
</div>
