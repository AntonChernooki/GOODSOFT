<div class="login-container">
    <div class="login-card">
        <div class="login-card__header">
            <h3>Вход в систему</h3>
        </div>

        <div class="login-card__body">
            <form (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" class="form-control" [(ngModel)]="login" name="login" required />
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="form-control" [(ngModel)]="password" name="password"
                        required />
                </div>

                <button type="submit" class="btn btn--primary">Войти</button>
            </form>
        </div>

        <div class="login-card__footer">
            <a routerLink="/registration" class="link">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>
</div>
